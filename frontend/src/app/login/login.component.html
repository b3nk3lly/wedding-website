<div class="login-page">
  <div class="card-wrapper">
    <div class="login-card">

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

        <header class="form-header">
          <p class="eyebrow">Welcome</p>
          <h1 class="form-title">Sign In</h1>
          <div class="divider">
            <span class="divider-line"></span>
            <span class="divider-ornament">✦</span>
            <span class="divider-line"></span>
          </div>
          <p class="form-subtitle">Please sign in to access your invitation.</p>
        </header>

        <!-- ── USERNAME ── -->
        <div class="field-group">
          <label class="field-label" for="username">Username</label>
          <input
            id="username"
            type="text"
            class="text-input"
            formControlName="username"
            placeholder="Your invitation code"
            autocomplete="username"
            [class.input-error]="username?.touched && username?.invalid"/>
          @if (username?.touched && username?.hasError('required')) {
            <div class="field-error">Please enter your username.</div>
          }
        </div>

        <!-- ── PASSWORD ── -->
        <div class="field-group">
          <label class="field-label" for="password">Password</label>
          <div class="input-wrapper">
            <input
              id="password"
              [type]="showPassword() ? 'text' : 'password'"
              class="text-input"
              formControlName="password"
              placeholder="Your password"
              autocomplete="current-password"
              [class.input-error]="password?.touched && password?.invalid"/>
            <button
              type="button"
              class="toggle-password"
              (click)="togglePassword()"
              [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'">
              @if (showPassword()) {
                <!-- Eye-off icon -->
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              } @else {
                <!-- Eye icon -->
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              }
            </button>
          </div>
          @if (password?.touched && password?.hasError('required')) {
            <div class="field-error">Please enter your password.</div>
          }
        </div>

        <!-- ── SERVER ERROR ── -->
        @if (errorMessage()) {
          <div class="error-banner" role="alert">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            {{ errorMessage() }}
          </div>
        }

        <!-- ── SUBMIT ── -->
        <div class="form-footer">
          <button type="submit" class="btn-submit" [disabled]="isLoading()">
            @if (isLoading()) {
              <span class="spinner" aria-hidden="true"></span>
              <span>Signing in…</span>
            } @else {
              <span>Sign in</span>
              <svg class="btn-arrow" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M13 6l6 6-6 6"/>
              </svg>
            }
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
