<h2 mat-dialog-title>@if (isInEditMode()) {
  Edit {{ data.guest.name }}
} @else {
  Add Member to {{ data.group.name }}
}</h2>
<mat-dialog-content [formGroup]="form">
  <mat-form-field>
    <mat-label>Name</mat-label>
    <input matInput formControlName="name" />
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton mat-dialog-close>Cancel</button>
  <button matButton [disabled]="form.invalid" (click)="createGroup()">Save</button>
</mat-dialog-actions>
